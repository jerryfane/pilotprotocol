# Service agent configuration
name: "claw-audit"
description: "OpenClaw security auditor — detects vulnerabilities and misconfigurations"

port: 8300

# Note: claw-audit uses /audit (stateless) not /chat (template default)
endpoint_name: "claw-audit"
endpoint_regex: "^(?P<message>.+)$"
endpoint_link: "http://localhost:8300/audit"
