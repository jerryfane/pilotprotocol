# Service agent configuration
# Edit name, port, and description, then run ./start.sh

name: "{{AGENT_NAME}}"
description: "{{AGENT_DESCRIPTION}}"

# Port this agent's API listens on (must be unique across all agents)
port: {{AGENT_PORT}}

# Pilot Protocol integration
# endpoint_name: the command name in ~/.pilot/endpoints.yaml
# endpoint_regex: named capture groups become query parameters sent to GET /chat
#   - Use (?P<message>.+) to forward the full body as ?message=...
#   - Use (?P<from>...) (?P<to>...) for structured args
endpoint_name: "{{ENDPOINT_NAME}}"
endpoint_regex: "^(?P<message>.+)$"
